name: 更新法人買賣超資料

on:
  schedule:
    # GitHub cron 為 UTC。台股法人資料約收盤後傍晚定案,排兩個時段(允許延遲)。
    - cron: '0 10 * * 1-5'   # 台北 18:00
    - cron: '0 12 * * 1-5'   # 台北 20:00
  workflow_dispatch:          # 也可在 Actions 頁面手動觸發

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 抓取並產生 data.json
        run: node scripts/build-data.mjs
        env:
          TZ: Asia/Taipei

      - name: 有變更才 commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/data.json)" ]; then
            git add docs/data.json
            git commit -m "chore: 更新法人買賣超資料 ($(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M'))"
            git push
          else
            echo "資料無變更,略過 commit。"
          fi
